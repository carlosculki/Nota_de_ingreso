<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitácora de Entrega de Turno - Neo HSVP</title>
    <style>
        body { font-family: Arial, sans-serif; font-size: 12px; background: #f0f2f5; }
        .paciente-card { 
            background: white; 
            border: 2px solid #2c3e50; 
            margin-bottom: 20px; 
            padding: 15px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .header-card { grid-column: 1 / span 3; background: #2c3e50; color: white; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between; }
        .col { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; color: #34495e; font-size: 10px; text-transform: uppercase; }
        input, textarea { padding: 5px; border: 1px solid #bdc3c7; border-radius: 3px; }
        .alerta { background: #ffebee; border: 1px solid #ef5350; }
        .resumen-vig { font-weight: bold; color: #2980b9; background: #e1f5fe; padding: 5px; border-radius: 3px; text-align: center; }
        @media print { .no-print { display: none; } body { background: white; } .paciente-card { border: 1px solid #000; page-break-inside: avoid; } }
    </style>
</head>
<body>

<div class="no-print" style="padding: 20px; text-align: center;">
    <h1>ENTREGA DE TURNO - NEONATOLOGÍA</h1>
    <button onclick="addPaciente()" style="padding: 10px 20px; background: #27ae60; color: white; border: none; cursor: pointer;">+ AGREGAR PACIENTE</button>
</div>

<div id="contenedor-pacientes">
    </div>

<script>
    function addPaciente() {
        const id = Date.now();
        const html = `
        <div class="paciente-card" id="p-${id}">
            <div class="header-card">
                <span>SECTOR: <input type="text" placeholder="Cuna/Termo" style="width:60px"></span>
                <span>NOMBRE: <input type="text" placeholder="Apellidos Nombres" style="width:200px"></span>
                <span>HCL: <input type="text" style="width:80px"></span>
            </div>
            
            <div class="col">
                <label>Diagnóstico Primario</label>
                <textarea rows="2"></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <div><label>Edad/DH</label><input type="text" style="width:90%"></div>
                    <div><label>EGC</label><input type="text" style="width:90%"></div>
                </div>
                <label>Antropometría (g)</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:2px;">
                    <input type="number" placeholder="P. Inic" id="pi-${id}">
                    <input type="number" placeholder="P. Hoy" id="ph-${id}" oninput="calcVariacion(${id})">
                    <div id="var-${id}" style="font-size:9px; align-self:center;"></div>
                </div>
            </div>

            <div class="col">
                <label>Metabólico / Hídrico</label>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <div><label>Glicemia</label><input type="number" oninput="checkGlic(this)"></div>
                    <div><label>Diuresis</label><input type="text"></div>
                </div>
                <div class="resumen-vig" id="vig-res-${id}">VIG: -- | LT: --</div>
                <label>Alimentación / Hidratación</label>
                <textarea rows="2" placeholder="Tipo de leche / Solución IV"></textarea>
            </div>

            <div class="col">
                <label>Plan Terapéutico</label>
                <input type="text" placeholder="Antibiótico (Día X/Y)">
                <input type="text" placeholder="O2 / Ventilación">
                <input type="text" placeholder="Fototerapia / Otros">
                <label style="color:red;">Pendientes Críticos</label>
                <textarea rows="2" style="border-color: red;"></textarea>
            </div>

            <div class="no-print" style="grid-column: 1 / span 3; text-align: right;">
                <button onclick="document.getElementById('p-${id}').remove()" style="color:red; background:none; border:none; cursor:pointer;">Eliminar de lista</button>
            </div>
        </div>`;
        document.getElementById('contenedor-pacientes').insertAdjacentHTML('beforeend', html);
    }

    function calcVariacion(id) {
        const pi = parseFloat(document.getElementById(`pi-${id}`).value);
        const ph = parseFloat(document.getElementById(`ph-${id}`).value);
        if(pi && ph) {
            const varP = ((ph - pi) / pi * 100).toFixed(1);
            const el = document.getElementById(`var-${id}`);
            el.innerText = `Δ: ${varP}%`;
            el.style.color = varP < -10 ? 'red' : 'green';
        }
    }

    function checkGlic(el) {
        const val = parseFloat(el.value);
        if(val < 45 || val > 150) el.classList.add('alerta');
        else el.classList.remove('alerta');
    }
</script>

</body>
</html>
