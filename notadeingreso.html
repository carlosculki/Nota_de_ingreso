<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bitácora de Turno - Neo HSVP</title>
    <style>
        :root { --primary: #004d40; --secondary: #00897b; --bg: #e0f2f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 10px; font-size: 11px; }
        .paciente-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-box { grid-column: 1 / span 3; display: flex; justify-content: space-between; background: var(--primary); color: white; padding: 5px 10px; border-radius: 4px; }
        .section-title { font-weight: bold; color: var(--primary); border-bottom: 1px solid #ddd; margin-bottom: 5px; font-size: 10px; }
        .field { margin-bottom: 5px; display: flex; flex-direction: column; }
        input, textarea { border: 1px solid #999; border-radius: 3px; padding: 3px; font-size: 11px; }
        .math-box { background: #f1f8e9; border: 1px solid #c5e1a5; padding: 5px; border-radius: 4px; }
        .alert { background: #ffebee; border: 1px solid #ef5350; }
        @media print { .no-print { display: none; } .paciente-grid { break-inside: avoid; border: 1px solid black; } }
    </style>
</head>
<body>

<h2 class="no-print" style="text-align: center;">REGISTRO DE ENTREGA - NEONATOLOGÍA</h2>
<div class="no-print" style="text-align: center; margin-bottom: 20px;">
    <button onclick="nuevoPaciente()" style="padding: 10px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer;">+ AGREGAR PACIENTE AL TURNO</button>
</div>

<div id="lista-pacientes"></div>

<script>
function nuevoPaciente() {
    const id = Date.now();
    const template = `
    <div class="paciente-grid" id="card-${id}">
        <div class="header-box">
            <span>SECTOR: <input type="text" style="width:60px"></span>
            <span>NOMBRE: <input type="text" style="width:200px"></span>
            <span>HCL: <input type="text" style="width:70px"></span>
        </div>

        <div>
            <div class="section-title">DATOS CLÍNICOS</div>
            <div class="field"><label>DIAGNÓSTICO:</label><textarea rows="2"></textarea></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <div class="field"><label>EDAD/DH:</label><input type="text"></div>
                <div class="field"><label>EGC:</label><input type="text"></div>
            </div>
            <div class="section-title">PESO (g)</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:2px;">
                <div class="field"><label>INIC.</label><input type="number" id="pi-${id}"></div>
                <div class="field"><label>HOY</label><input type="number" id="ph-${id}" oninput="calcP(${id})"></div>
                <div class="field"><label>MAÑ.</label><input type="number"></div>
            </div>
            <div id="p-res-${id}" style="font-weight:bold; font-size:10px; text-align:center;"></div>
        </div>

        <div class="math-box">
            <div class="section-title">METABÓLICO / LÍQUIDOS</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <div class="field"><label>GLICEMIA:</label><input type="number" oninput="checkG(this)"></div>
                <div class="field"><label>DIURESIS:</label><input type="text"></div>
            </div>
            <hr>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <div class="field"><label>VOL. IV (ml/h):</label><input type="number" id="mlh-${id}" oninput="calcVIG(${id})"></div>
                <div class="field"><label>% DEXTR:</label><input type="number" id="dex-${id}" value="10" oninput="calcVIG(${id})"></div>
            </div>
            <div id="vig-res-${id}" style="color:#1b5e20; font-weight:bold; margin-top:5px;">
                LT: -- ml/kg/d <br> VIG: -- mg/kg/min
            </div>
            <div class="field"><label>BH / Kcal:</label><input type="text"></div>
        </div>

        <div>
            <div class="section-title">TERAPÉUTICO</div>
            <div class="field"><label>ALIMENTACIÓN:</label><input type="text"></div>
            <div class="field"><label>ANTIBIÓTICO (Día X/Y):</label><input type="text"></div>
            <div class="field"><label>O2 / VENTILACIÓN:</label><input type="text"></div>
            <div class="section-title" style="color:red;">PENDIENTES / LABORATORIO</div>
            <textarea rows="3" style="border: 1px solid red; width: 95%;"></textarea>
            <div class="no-print" style="text-align:right; margin-top:5px;">
                <button onclick="document.getElementById('card-${id}').remove()" style="color:red; border:none; background:none; cursor:pointer;">Eliminar ✖</button>
            </div>
        </div>
    </div>`;
    document.getElementById('lista-pacientes').insertAdjacentHTML('beforeend', template);
}

function calcP(id) {
    const pi = parseFloat(document.getElementById(`pi-${id}`).value);
    const ph = parseFloat(document.getElementById(`ph-${id}`).value);
    if(pi && ph) {
        const diff = (((ph - pi) / pi) * 100).toFixed(1);
        document.getElementById(`p-res-${id}`).innerText = `Variación: ${diff}%`;
        document.getElementById(`p-res-${id}`).style.color = diff < -10 ? 'red' : 'green';
    }
}

function calcVIG(id) {
    const ph = parseFloat(document.getElementById(`ph-${id}`).value) || 0;
    const mlh = parseFloat(document.getElementById(`mlh-${id}`).value) || 0;
    const dex = parseFloat(document.getElementById(`dex-${id}`).value) || 0;
    
    if(ph > 0) {
        const lt = (mlh * 24) / (ph / 1000);
        const vig = (mlh * dex) / (ph / 1000 * 6);
        document.getElementById(`vig-res-${id}`).innerHTML = `LT: ${lt.toFixed(1)} ml/kg/d <br> VIG: ${vig.toFixed(2)} mg/kg/min`;
    }
}

function checkG(el) {
    const v = parseFloat(el.value);
    if(v < 45 || v > 150) el.className = 'alert'; else el.className = '';
}
</script>
</body>
</html>
